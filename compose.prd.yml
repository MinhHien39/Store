services:
  db:
    image: ${APP_NAME}-db-${ENV}
    container_name: ${APP_NAME}-db-${ENV}
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - ${DATABASE_PORT}:${DATABASE_PORT}
    volumes:
      - mysql-data:/var/lib/mysql
      - type: bind
        source: ${HOST_PROJECT_DIR:-.}/database/mysql.cnf
        target: /etc/mysql/conf.d/mysql.cnf
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DATABASE_USER}", "-p${DATABASE_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1024m
    memswap_limit: 1024m
    restart: unless-stopped

  redis:
    image: ${APP_NAME}-redis-${ENV}
    container_name: ${APP_NAME}-redis-${ENV}
    build:
      context: ./redis
      dockerfile: Dockerfile
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 64m
    restart: unless-stopped

  backend:
    image: ${APP_NAME}-backend-${ENV}
    container_name: ${APP_NAME}-backend-${ENV}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        ENV: ${ENV}
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${HOST_PROJECT_DIR:-.}/environment
        target: /environment
      - type: bind
        source: ${HOST_PROJECT_DIR:-.}/backend
        target: /backend
      - type: bind
        source: ${HOME}/.aws/${APP_NAME}
        target: /root/.aws
      - type: bind
        source: ${HOST_PROJECT_DIR:-.}/logs/backend
        target: /backend/logs
      - backend-uploads:/backend/uploads
    mem_limit: 1536m
    memswap_limit: 1536m
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -I http://localhost:8000/ | grep '200 OK' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${APP_NAME}-frontend-${ENV}
    container_name: ${APP_NAME}-frontend-${ENV}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - ENV=${ENV}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_GOOGLE_ADSENSE_CLIENT=${NEXT_PUBLIC_GOOGLE_ADSENSE_CLIENT}
      - NEXT_PUBLIC_GOOGLE_ADSENSE_HOME_SLOT=${NEXT_PUBLIC_GOOGLE_ADSENSE_HOME_SLOT}
      - NEXT_PUBLIC_GOOGLE_ADSENSE_PRODUCT_LIST_SLOT=${NEXT_PUBLIC_GOOGLE_ADSENSE_PRODUCT_LIST_SLOT}
      - NEXT_PUBLIC_GOOGLE_ADSENSE_PRODUCT_DETAIL_SLOT=${NEXT_PUBLIC_GOOGLE_ADSENSE_PRODUCT_DETAIL_SLOT}
      - BACKEND_INTERNAL_URL=http://backend:8000
    ports:
      - ${NEXT_PUBLIC_PORT}:3000
    depends_on:
      - backend
    restart: always

  nginx:
    image: ${APP_NAME}-nginx-${ENV}
    container_name: ${APP_NAME}-nginx-${ENV}
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
      args:
        ENV: ${ENV}
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - SERVER_NAME=${SERVER_NAME}
      - ENV=${ENV}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    mem_limit: 64m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - type: bind
        source: ${HOST_PROJECT_DIR:-.}/logs/nginx
        target: /var/log/nginx
      - type: bind
        source: ${HOST_PROJECT_DIR:-.}/nginx/certs
        target: /etc/nginx/certs
        read_only: true
      - backend-uploads:/backend/uploads:ro

volumes:
  mysql-data:
  redis-data:
  backend-uploads:
