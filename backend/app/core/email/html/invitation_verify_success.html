<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;url={redirect_url}">
    <title>アカウント有効化完了</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #f0fdf4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            width: 100%;
            text-align: center;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 32px 24px;
        }
        .card-header h1 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
        }
        .card-body {
            padding: 40px 32px;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background-color: #d1fae5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: #10b981;
        }
        .title {
            color: #111827;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .description {
            color: #6b7280;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .countdown {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .countdown span {
            color: #10b981;
            font-weight: 700;
            font-size: 18px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background-color: #10b981;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #059669;
        }
        .card-footer {
            padding: 16px 24px;
            background-color: #f9fafb;
            border-top: 1px solid #e5e7eb;
        }
        .card-footer p {
            color: #9ca3af;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>アカウント有効化完了</h1>
        </div>

        <div class="card-body">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <p class="title">アカウントが正常に有効化されました</p>
            <p class="description">ログインページへ自動的にリダイレクトされます。</p>

            <p class="countdown"><span id="seconds">15</span> 秒後にリダイレクトします...</p>

            <a href="{redirect_url}" class="btn">今すぐログインページへ</a>
        </div>

        <div class="card-footer">
            <p>&copy; {current_year} Store. All rights reserved.</p>
        </div>
    </div>

    <script>
        (function () {
            var seconds = 15;
            var el = document.getElementById('seconds');
            var timer = setInterval(function () {
                seconds--;
                if (el) el.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.href = '{redirect_url}';
                }
            }, 1000);
        })();
    </script>
</body>
</html>
