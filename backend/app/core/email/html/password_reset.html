<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードリセット</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background-color: #f5f5f5;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" bgcolor="#f5f5f5">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" bgcolor="#ffffff" style="border-radius: 8px;">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 30px 40px; background-color: #f5576c; border-radius: 8px 8px 0 0;">
                            <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 600;">
                                パスワードリセット
                            </h1>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding: 40px;">
                            <p style="margin: 0 0 20px 0; color: #333333; font-size: 16px; line-height: 1.8;">
                                こんにちは{greeting}。
                            </p>

                            <p style="margin: 0 0 20px 0; color: #333333; font-size: 16px; line-height: 1.8;">
                                パスワードリセットのリクエストを受け付けました。
                            </p>

                            <p style="margin: 0 0 32px 0; color: #333333; font-size: 16px; line-height: 1.8;">
                                以下のリンクから、パスワードをリセットしてください。
                            </p>

                            <!-- Reset Link Box -->
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                                <tr>
                                    <td align="center" style="padding: 28px; background-color: #fff0f0; border-radius: 8px;" bgcolor="#fff0f0">
                                        <a href="{reset_password_url}" style="display: inline-block; padding: 12px 28px; border-radius: 6px; background-color: #f5576c; color: #ffffff; font-size: 16px; font-weight: 700; text-decoration: none;">
                                            パスワードをリセットする
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin: 28px 0 20px 0; color: #666666; font-size: 14px; line-height: 1.6; text-align: center;">
                                このリセットコードは <strong style="color: #333333;">15分間</strong> 有効です。
                            </p>

                            <!-- Security Warning -->
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                                <tr>
                                    <td style="padding: 14px 16px; background-color: #fff3cd; border-left: 4px solid #ffc107;" bgcolor="#fff3cd">
                                        <p style="margin: 0; color: #856404; font-size: 13px; line-height: 1.6;">
                                            <strong>&#9888; セキュリティ上の注意</strong><br>
                                            もし心当たりがない場合は、すぐにパスワードを変更することをお勧めします。
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 24px 40px; background-color: #f8f9fa; border-radius: 0 0 8px 8px; border-top: 1px solid #e9ecef;" bgcolor="#f8f9fa">
                            <p style="margin: 0; color: #999999; font-size: 12px; line-height: 1.6; text-align: center;">
                                このメールは自動送信されています。返信はできません。<br>
                                &copy; {current_year} Store. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
