# ─────────────────────────────────────────────────────────────
# GitHub Actions — Deploy to Production via SSH
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VPS_HOST        = 180.93.36.17
#   VPS_USER        = root
#   VPS_SSH_KEY     = (nội dung file ~/.ssh/id_rsa của máy local)
#   VPS_PROJECT_DIR = /root/store
#   PRD_BASE_URL    = https://tmhstore.site
# ─────────────────────────────────────────────────────────────

name: Deploy Production

on:
  push:
    branches:
      - deploy_prd

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            REPO="${{ secrets.VPS_PROJECT_DIR }}"

            echo "=== [1/4] Git pull ==="
            git -C "$REPO" fetch origin deploy_prd
            git -C "$REPO" checkout deploy_prd
            git -C "$REPO" reset --hard origin/deploy_prd
            echo "Code: $(git -C $REPO log -1 --oneline)"

            echo "=== [2/4] Reload Gunicorn ==="
            docker kill --signal=HUP store-backend-prd
            sleep 3
            echo "Gunicorn reloaded"

            echo "=== [3/4] Reload Nginx ==="
            docker exec store-nginx-prd nginx -t
            docker exec store-nginx-prd nginx -s reload
            echo "Nginx reloaded"

            echo "=== [4/4] Status ==="
            docker inspect --format 'backend={{.State.Status}}' store-backend-prd
            docker inspect --format 'nginx={{.State.Status}}' store-nginx-prd

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Test endpoints
        env:
          BASE_URL: ${{ secrets.PRD_BASE_URL }}
        run: |
          echo "=== Smoke Test $BASE_URL ==="

          echo "[1] Backend health"
          HEALTH=$(curl -sf --max-time 10 "$BASE_URL/api/v1/get-healthy")
          echo "$HEALTH" | grep -q '"status":"ok"' || (echo "FAIL health" && exit 1)
          echo "$HEALTH" | grep -q '"db":"ok"' || (echo "FAIL db" && exit 1)
          echo "OK backend+db"

          echo "[2] Products API"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/api/v1/products")
          [ "$CODE" = "200" ] || (echo "FAIL products $CODE" && exit 1)
          echo "OK products"

          echo "[3] Frontend"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$BASE_URL/")
          [ "$CODE" = "200" ] || (echo "FAIL frontend $CODE" && exit 1)
          echo "OK frontend"

          echo "All smoke tests passed"
