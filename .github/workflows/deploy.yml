# ─────────────────────────────────────────────────────────────
# GitHub Actions — Deploy to Production via SSH
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VPS_HOST        = 180.93.36.17
#   VPS_USER        = root
#   VPS_SSH_KEY     = (nội dung file ~/.ssh/github_actions_deploy)
#   VPS_PROJECT_DIR = /root/store
# ─────────────────────────────────────────────────────────────

name: Deploy Production

on:
  push:
    branches:
      - deploy_prd

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            REPO="${{ secrets.VPS_PROJECT_DIR }}"

            echo "=== [1/4] Git pull ==="
            git -C "$REPO" fetch origin deploy_prd
            git -C "$REPO" checkout deploy_prd
            git -C "$REPO" reset --hard origin/deploy_prd
            echo "Code: $(git -C $REPO log -1 --oneline)"

            echo "=== [2/3] Reload Gunicorn ==="
            docker kill --signal=HUP store-backend-prd
            sleep 3
            echo "Gunicorn reloaded"

            echo "=== [3/3] Reload Nginx ==="
            docker exec store-nginx-prd nginx -t
            docker exec store-nginx-prd nginx -s reload
            echo "Nginx reloaded"

            echo "=== Done ==="
            docker inspect --format 'backend={{.State.Status}}' store-backend-prd
            docker inspect --format 'nginx={{.State.Status}}' store-nginx-prd
