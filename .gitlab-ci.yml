# ─────────────────────────────────────────────────────────────
# GitLab CI/CD — Deploy to Production
# Dùng GitLab Shared Runners (không cần cài gì trên VPS)
# Runner SSH vào VPS để deploy
#
# Required GitLab CI/CD Variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY  — nội dung file .pem (type: Variable, protected, masked)
#   VPS_HOST         — IP VPS, vd: 57.182.103.190
#   VPS_USER         — user SSH, vd: ec2-user hoặc root
#   VPS_PROJECT_DIR  — đường dẫn project trên VPS, vd: /home/ec2-user/store
#   PRD_BASE_URL     — URL public, vd: https://tmhstore.site
# ─────────────────────────────────────────────────────────────

stages:
  - deploy
  - smoke-test

# ─── Deploy job ─────────────────────────────────────────────
deploy_prd:
  stage: deploy
  image: ubuntu:24.04

  rules:
    - if: '$CI_COMMIT_BRANCH == "deploy_prd"'
      when: on_success

  environment:
    name: production
    url: $PRD_BASE_URL

  before_script:
    - apt-get update -qq && apt-get install -y -qq openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

  script:
    - |
      ssh "$VPS_USER@$VPS_HOST" "bash -s" << REMOTE
      set -e

      REPO="${VPS_PROJECT_DIR}"
      BACKEND_CONTAINER="store-backend-prd"
      NGINX_CONTAINER="store-nginx-prd"

      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  [1/4] Git pull latest code"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      git -C "\$REPO" fetch origin deploy_prd
      git -C "\$REPO" reset --hard origin/deploy_prd
      echo "✅ Code: \$(git -C \$REPO log -1 --oneline)"

      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  [2/4] Reload Gunicorn (zero-downtime)"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      docker kill --signal=HUP "\$BACKEND_CONTAINER"
      sleep 3
      echo "✅ Gunicorn reloaded"

      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  [3/4] Reload Nginx config"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      docker exec "\$NGINX_CONTAINER" nginx -t
      docker exec "\$NGINX_CONTAINER" nginx -s reload
      echo "✅ Nginx reloaded"

      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  [4/4] Status"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  Backend: \$(docker inspect --format '{{.State.Status}}' \$BACKEND_CONTAINER)"
      echo "  Nginx  : \$(docker inspect --format '{{.State.Status}}' \$NGINX_CONTAINER)"
      REMOTE

  artifacts:
    when: always
    expire_in: 7 days

# ─── Smoke Test ─────────────────────────────────────────────
smoke_test_prd:
  stage: smoke-test
  image: ubuntu:24.04

  rules:
    - if: '$CI_COMMIT_BRANCH == "deploy_prd"'
      when: on_success

  needs:
    - deploy_prd

  before_script:
    - apt-get update -qq && apt-get install -y -qq curl

  script:
    - |
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  Smoke Test: $PRD_BASE_URL"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      echo "[1] Backend health"
      HEALTH=$(curl -sf --max-time 10 "$PRD_BASE_URL/api/v1/get-healthy")
      echo "$HEALTH" | grep -q '"status":"ok"' || (echo "❌ Health check failed" && exit 1)
      echo "$HEALTH" | grep -q '"db":"ok"'     || (echo "❌ DB unreachable" && exit 1)
      echo "✅ Backend + DB ok"

      echo "[2] Products API"
      CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PRD_BASE_URL/api/v1/products")
      [ "$CODE" = "200" ] || (echo "❌ Products API: $CODE" && exit 1)
      echo "✅ Products API ok"

      echo "[3] Frontend"
      CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$PRD_BASE_URL/")
      [ "$CODE" = "200" ] || (echo "❌ Frontend: $CODE" && exit 1)
      echo "✅ Frontend ok"

      echo "✅ All smoke tests passed"


stages:
  - deploy
  - smoke-test

# ══════════════════════════════════════════════════════════════
