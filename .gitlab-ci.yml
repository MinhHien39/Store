# ─────────────────────────────────────────────────────────────
# GitLab CI/CD — Deploy to Production
# Runner cài trên VPS (executor = shell), không cần SSH
#
# Required GitLab CI/CD Variables (Settings → CI/CD → Variables):
#   VPS_PROJECT_DIR = /root/store
#   PRD_BASE_URL    = https://tmhstore.site
# ─────────────────────────────────────────────────────────────

stages:
  - deploy
  - smoke-test

# ─── Deploy ──────────────────────────────────────────────────
deploy_prd:
  stage: deploy

  rules:
    - if: '$CI_COMMIT_BRANCH == "deploy_prd"'
      when: on_success

  environment:
    name: production
    url: $PRD_BASE_URL

  script:
    - set -e
    - REPO="${VPS_PROJECT_DIR:-/root/store}"
    - BACKEND="store-backend-prd"
    - NGINX="store-nginx-prd"

    - echo "=== [1/4] Git pull ==="
    - git -C "$REPO" fetch origin deploy_prd
    - git -C "$REPO" reset --hard origin/deploy_prd
    - echo "Code $(git -C $REPO log -1 --oneline)"

    - echo "=== [2/4] Reload Gunicorn ==="
    - docker kill --signal=HUP "$BACKEND"
    - sleep 3
    - echo "Gunicorn reloaded"

    - echo "=== [3/4] Reload Nginx ==="
    - docker exec "$NGINX" nginx -t
    - docker exec "$NGINX" nginx -s reload
    - echo "Nginx reloaded"

    - echo "=== [4/4] Status ==="
    - docker inspect --format 'backend={{.State.Status}}' "$BACKEND"
    - docker inspect --format 'nginx={{.State.Status}}' "$NGINX"

  artifacts:
    when: always
    expire_in: 7 days

# ─── Smoke Test ──────────────────────────────────────────────
smoke_test_prd:
  stage: smoke-test

  rules:
    - if: '$CI_COMMIT_BRANCH == "deploy_prd"'
      when: on_success

  needs:
    - deploy_prd

  script:
    - echo "=== Smoke Test $PRD_BASE_URL ==="

    - echo "[1] Backend health"
    - HEALTH=$(curl -sf --max-time 10 "$PRD_BASE_URL/api/v1/get-healthy")
    - echo "$HEALTH" | grep -q '"status":"ok"' || (echo "FAIL health" && exit 1)
    - echo "$HEALTH" | grep -q '"db":"ok"' || (echo "FAIL db" && exit 1)
    - echo "OK backend+db"

    - echo "[2] Products API"
    - CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PRD_BASE_URL/api/v1/products")
    - '[ "$CODE" = "200" ] || (echo "FAIL products $CODE" && exit 1)'
    - echo "OK products"

    - echo "[3] Frontend"
    - CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$PRD_BASE_URL/")
    - '[ "$CODE" = "200" ] || (echo "FAIL frontend $CODE" && exit 1)'
    - echo "OK frontend"

    - echo "All smoke tests passed"
